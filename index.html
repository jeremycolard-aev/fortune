<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire - Contacts & Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-6 text-center md:text-left md:flex md:items-center md:justify-between border-b border-gray-200 pb-5">
          <div>
              <h1 class="text-3xl font-bold text-indigo-950 tracking-tight flex items-center justify-center md:justify-start gap-3">
                  <i class="fa-solid fa-folder-tree text-indigo-600"></i>
                  Espace d'Administration
              </h1>
              <p class="mt-1 text-sm text-gray-500">Visualisation des contacts, devis et factures en temps réel.</p>
          </div>
          <div class="mt-4 md:mt-0">
              <span id="global-counter" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-indigo-100 text-indigo-800 shadow-sm">
                  Chargement...
              </span>
          </div>
        </div>

        <div class="border-b border-gray-200 mb-6">
            <nav class="flex space-x-8" aria-label="Tabs">
                <button id="btn-tab-contacts" onclick="switchTab('contacts')" 
                        class="border-b-2 border-indigo-600 text-indigo-600 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all">
                    <i class="fa-solid fa-address-book"></i> Contacts
                </button>
                <button id="btn-tab-documents" onclick="switchTab('documents')" 
                        class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Factures & Devis
                </button>
            </nav>
        </div>

        <div class="mb-6 bg-white rounded-xl shadow-sm p-4 border border-gray-100">
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                </div>
                <input type="text" id="search-input" oninput="handleSearch()"
                       class="block w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all placeholder-gray-400" 
                       placeholder="Rechercher dans l'onglet actif...">
            </div>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-16">
            <svg class="animate-spin h-10 w-10 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-gray-500 font-medium">Synchronisation avec Google Sheets...</p>
        </div>

        <div id="error-state" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl mb-6 shadow-sm">
            <div class="flex">
                <div class="flex-shrink-0"><i class="fa-solid fa-circle-exclamation text-red-500 text-xl"></i></div>
                <div class="ml-3">
                    <h3 class="text-sm font-semibold text-red-800">Erreur de liaison</h3>
                    <p id="error-message" class="mt-1 text-sm text-red-700"></p>
                </div>
            </div>
        </div>

        <div id="empty-state" class="hidden text-center py-16 bg-white rounded-xl shadow-sm border border-gray-100">
            <i class="fa-solid fa-box-open text-gray-300 text-5xl mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900">Aucun élément trouvé</h3>
            <p class="mt-1 text-sm text-gray-500">Modifiez les termes de votre recherche ou vérifiez vos feuilles de calcul.</p>
        </div>

        <div id="container-contacts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>

        <div id="container-documents" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>

    </div>

    <script>
        // /!\ METTEZ ICI VOTRE URL DE WEB APP OBTENUE APRÈS LE NOUVEAU DÉPLOIEMENT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxwsZDQY_W9hj3cM8CcC7BHmNsGkvvg-Yoci0i3THyDisu-TL2pBW0NP3UwGA7Is9kF/exec";

        // Données globales chargées en mémoire
        let store = { contacts: [], documents: [] };
        let activeTab = 'contacts'; // 'contacts' ou 'documents'

        // Au démarrage
        window.addEventListener('DOMContentLoaded', loadAllData);

        async function loadAllData() {
            if (WEB_APP_URL === "VOTRE_URL_WEB_APP_ICI") {
                showError("Veuillez configurer la constante WEB_APP_URL avec votre adresse de déploiement Google Apps Script.");
                return;
            }
            try {
                toggleLoading(true);
                const response = await fetch(WEB_APP_URL, { method: 'GET', redirect: 'follow' });
                if (!response.ok) throw new Error(`Erreur HTTP : ${response.status}`);
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                store.contacts = data.contacts || [];
                store.documents = data.documents || [];
                
                toggleLoading(false);
                renderActiveTab();
            } catch (err) {
                showError(err.message);
            }
        }

        // Basculer visuellement et logiquement d'un onglet à l'être
        function switchTab(tabName) {
            activeTab = tabName;
            document.getElementById('search-input').value = ''; // Réinitialise la recherche à chaque changement d'onglet
            
            const btnContacts = document.getElementById('btn-tab-contacts');
            const btnDocs = document.getElementById('btn-tab-documents');
            
            if (activeTab === 'contacts') {
                btnContacts.className = "border-b-2 border-indigo-600 text-indigo-600 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all";
                btnDocs.className = "border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all";
                document.getElementById('search-input').placeholder = "Rechercher une organisation, un nom, un email...";
            } else {
                btnDocs.className = "border-b-2 border-indigo-600 text-indigo-600 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all";
                btnContacts.className = "border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-1 pb-4 text-sm font-medium flex items-center gap-2 focus:outline-none transition-all";
                document.getElementById('search-input').placeholder = "Rechercher par titre de document, type (Devis, Facture)...";
            }
            renderActiveTab();
        }

        // Gérer le filtrage en direct
        function handleSearch() {
            renderActiveTab();
        }

        // Moteur de rendu
        function renderActiveTab() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const containerContacts = document.getElementById('container-contacts');
            const containerDocs = document.getElementById('container-documents');
            const emptyState = document.getElementById('empty-state');
            
            containerContacts.classList.add('hidden');
            containerDocs.classList.add('hidden');
            emptyState.classList.add('hidden');

            if (activeTab === 'contacts') {
                containerContacts.classList.remove('hidden');
                const filtered = store.contacts.filter(c => 
                    (c.organisation && c.organisation.toLowerCase().includes(query)) ||
                    (c.nom && c.nom.toLowerCase().includes(query)) ||
                    (c.email && c.email.toLowerCase().includes(query)) ||
                    (c.mobile && c.mobile.toLowerCase().includes(query)) ||
                    (c.siret && c.siret.toLowerCase().includes(query))
                );
                displayContacts(filtered);
                updateCounter(`${filtered.length} contact${filtered.length > 1 ? 's' : ''} trouvé(s)`);
            } else {
                containerDocs.classList.remove('hidden');
                const filtered = store.documents.filter(d => 
                    (d.titre && d.titre.toLowerCase().includes(query)) ||
                    (d.type && d.type.toLowerCase().includes(query)) ||
                    (d.id && d.id.toLowerCase().includes(query))
                );
                displayDocuments(filtered);
                updateCounter(`${filtered.length} document${filtered.length > 1 ? 's' : ''} filtré(s)`);
            }
        }

        // Affichage des cartes contacts
        function displayContacts(list) {
            const target = document.getElementById('container-contacts');
            target.innerHTML = '';
            if(list.length === 0) { document.getElementById('empty-state').classList.remove('hidden'); return; }
            
            list.forEach(c => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col justify-between";
                div.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-2">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-indigo-50 text-indigo-700 truncate max-w-[80%]">
                                <i class="fa-solid fa-building mr-1"></i> ${escapeHtml(c.organisation) || 'Sans entité'}
                            </span>
                            <span class="text-xs font-mono text-gray-300">#${escapeHtml(c.id)}</span>
                        </div>
                        <h2 class="text-base font-bold text-gray-900 mb-3">${escapeHtml(c.nom) || 'Nom inconnu'}</h2>
                        <div class="space-y-1.5 text-sm text-gray-600 border-t border-gray-50 pt-2">
                            ${c.mobile ? `<p><i class="fa-solid fa-phone text-gray-400 w-4 mr-1"></i> <a href="tel:${c.mobile}" class="hover:text-indigo-600">${escapeHtml(c.mobile)}</a></p>`:''}
                            ${c.email ? `<p class="truncate"><i class="fa-solid fa-envelope text-gray-400 w-4 mr-1"></i> <a href="mailto:${c.email}" class="hover:text-indigo-600">${escapeHtml(c.email)}</a></p>`:''}
                        </div>
                    </div>
                `;
                target.appendChild(div);
            });
        }

        // Affichage des cartes documents (Devis / Factures)
        function displayDocuments(list) {
            const target = document.getElementById('container-documents');
            target.innerHTML = '';
            if(list.length === 0) { document.getElementById('empty-state').classList.remove('hidden'); return; }

            list.forEach(d => {
                const isDevis = d.type === "Devis";
                // Style du badge selon le type
                const badgeClass = isDevis ? "bg-cyan-50 text-cyan-700 border-cyan-200" : "bg-emerald-50 text-emerald-700 border-emerald-200";
                const iconClass = isDevis ? "fa-file-signature" : "fa-file-invoice";

                const div = document.createElement('div');
                div.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col justify-between transition-all hover:shadow-md";
                div.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-3">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold border ${badgeClass}">
                                <i class="fa-solid ${iconClass} mr-1.5"></i> ${d.type}
                            </span>
                            <span class="text-xs font-mono text-gray-300">#${escapeHtml(d.id)}</span>
                        </div>
                        <h2 class="text-base font-semibold text-gray-900 mb-4 line-clamp-2" title="${escapeHtml(d.titre)}">
                            ${escapeHtml(d.titre) || 'Document sans titre'}
                        </h2>
                    </div>
                    
                    <div class="mt-4 pt-3 border-t border-gray-100 flex items-center justify-between gap-2">
                        <a href="${escapeHtml(d.url)}" target="_blank" 
                           class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-lg transition-colors">
                            <i class="fa-solid fa-file-pdf text-sm"></i> Voir le PDF
                        </a>
                        <button onclick="confirmDeleteDocument('${escapeHtml(d.id)}', '${escapeHtml(d.titre)}')" 
                                class="inline-flex items-center gap-1 text-xs font-medium text-red-600 hover:text-white hover:bg-red-600 border border-transparent hover:border-red-700 px-3 py-2 rounded-lg transition-all">
                            <i class="fa-solid fa-trash-can"></i> Supprimer
                        </button>
                    </div>
                `;
                target.appendChild(div);
            });
        }

        // Action de suppression
        async function confirmDeleteDocument(id, title) {
            const check = confirm(`⚠️ ATTENTION ⚠️\n\nÊtes-vous sûr de vouloir supprimer le document suivant :\n"${title}" ?\n\nCette action va effacer définitivement sa ligne correspondante dans le fichier Google Sheets.`);
            if (!check) return;

            try {
                toggleLoading(true);
                // Appel en GET avec action passée en paramètre pour simplifier et contourner les blocages CORS AppScript.
                const url = `${WEB_APP_URL}?action=deleteDocument&id=${encodeURIComponent(id)}`;
                
                const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                if(!response.ok) throw new Error("Échec technique de communication.");
                
                const result = await response.json();
                
                if (result.success) {
                    alert("Succès : Le document a bien été retiré de la base de données.");
                    // Mise à jour de la mémoire locale sans recharger toute l'API
                    store.documents = store.documents.filter(doc => doc.id !== id);
                    toggleLoading(false);
                    renderActiveTab();
                } else {
                    throw new Error(result.error || "Raison inconnue.");
                }
            } catch (err) {
                toggleLoading(false);
                alert("Erreur lors de la suppression : " + err.message);
            }
        }

        // Outils utilitaires
        function toggleLoading(show) {
            document.getElementById('loading-state').className = show ? "flex flex-col items-center justify-center py-16" : "hidden";
        }
        function updateCounter(text) {
            document.getElementById('global-counter').textContent = text;
        }
        function showError(msg) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = msg;
        }
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
